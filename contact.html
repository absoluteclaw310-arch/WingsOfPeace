<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Wings of Peace</title>
    <style>
        :root {
            --primary-color: #555;
            --accent-color: #fdfdfd;
            --bg-color: #f9f9f9;
            --text-color: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 0;
            background-color: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: #999;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('images/gallery2.png') center/cover no-repeat;
            animation: fadeIn 1.5s ease-out;
        }

        .hero-content {
            z-index: 1;
            padding: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Contact Section */
        .contact-container {
            max-width: 700px;
            margin: 4rem auto;
            padding: 0 2rem;
            animation: slideUp 1s ease-out;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h2 {
            font-weight: 300;
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .contact-header p {
            color: #777;
            font-style: italic;
        }

        .contact-form {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-color);
            box-sizing: border-box;
            transition: var(--transition);
            background-color: #fafafa;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ccc;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.02);
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 2rem;
        }

        .submit-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: #aaa;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .contact-form { padding: 1.5rem; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="weddings.html">Weddings</a>
        <a href="funerals.html">Funerals</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>CONTACT US</h1>
        </div>
    </section>

    <div class="contact-container">
        <div class="contact-header">
            <h2>Reach Out to Us</h2>
            <p>Let us help you create a moment of peace and serenity.</p>
        </div>

        <form class="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="date">Event Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="Event City/Venue" required>
            </div>
            <div class="form-group">
                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="5" placeholder="Tell us more about your needs..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer>
        &copy; 2026 Wings of Peace &bull; Spreading Harmony Worldwide
    </footer>

</body>
</html>
