<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Wings of Peace</title>
    <style>
        :root {
            --primary-color: #555;
            --accent-color: #fdfdfd;
            --bg-color: #f9f9f9;
            --text-color: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 0;
            background-color: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: #999;
        }


        /* Hero Section */
        .hero {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('images/gallery2.png') center/cover no-repeat;
            animation: fadeIn 1.5s ease-out;
        }

        .hero-content {
            z-index: 1;
            padding: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Contact Section */
        .contact-container {
            max-width: 700px;
            margin: 4rem auto;
            padding: 0 2rem;
            animation: slideUp 1s ease-out;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h2 {
            font-weight: 300;
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .contact-header p {
            color: #777;
            font-style: italic;
        }

        .contact-form {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-color);
            box-sizing: border-box;
            transition: var(--transition);
            background-color: #fafafa;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ccc;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.02);
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 2rem;
        }

        .submit-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background-color: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        .form-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .form-message.success {
            display: block;
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .form-message.error {
            display: block;
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: #aaa;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .contact-form { padding: 1.5rem; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="weddings.html">Weddings</a>
        <a href="funerals.html">Funerals</a>
        <a href="contact.html">Book Now</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>CONTACT US</h1>
        </div>
    </section>

    <div class="contact-container">
        <div class="contact-header">
            <h2>Reach Out to Us</h2>
            <p>Let us help you create a moment of peace and serenity.</p>
        </div>

        <div class="contact-form">
            <form id="google-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="entry.803755823" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="entry.1874757480" placeholder="Your phone number" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="entry.1188234963" placeholder="Your email address" required>
                </div>
                <div class="form-group">
                    <label for="date">Event Date</label>
                    <input type="date" id="date" name="entry.1180529794" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="entry.566688593" placeholder="Event location" required>
                </div>
                
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label for="event-type">Type of Event</label>
                        <select id="event-type" name="event-type" style="width: 100%; padding: 0.8rem; border: 1px solid #eee; border-radius: 8px; font-family: inherit; font-size: 1rem; color: var(--text-color); background-color: #fafafa;" required>
                            <option value="">Select Event Type</option>
                            <option value="Wedding">Wedding</option>
                            <option value="Funeral">Funeral/Memorial</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label for="birds">Number of Birds</label>
                        <input type="number" id="birds" name="birds" min="1" max="50" placeholder="e.g. 2" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" name="entry.1334809540" rows="4" placeholder="Tell us more about your request..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
                <div id="form-message" class="form-message"></div>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 Wings of Peace &bull; Spreading Harmony Worldwide
    </footer>

    <script>
        const form = document.getElementById('google-form');
        const messageDiv = document.getElementById('form-message');
        const submitBtn = document.getElementById('submit-btn');

        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            const formData = new FormData(form);
            
            // Combine new fields into comments because we don't have separate entry IDs
            const eventType = document.getElementById('event-type').value;
            const birds = document.getElementById('birds').value;
            const originalComments = document.getElementById('comments').value;
            
            const combinedComments = `Type: ${eventType}\nBirds: ${birds}\n\nNotes:\n${originalComments}`;
            formData.set('entry.1334809540', combinedComments);

            const formId = '1FAIpQLSdlsOAg2b8l4Kw311U1XKIeNgZen99b-bolB_mqoVnKaR3qQw';
            const actionUrl = `https://docs.google.com/forms/d/e/${formId}/formResponse`;

            try {
                await fetch(actionUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                messageDiv.textContent = 'Thank you! Your request has been sent.';
                messageDiv.className = 'form-message success';
                form.reset();
            } catch (error) {
                messageDiv.textContent = 'Something went wrong. Please try again.';
                messageDiv.className = 'form-message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
